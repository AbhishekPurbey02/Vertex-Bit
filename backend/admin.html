<!DOCTYPE html>
<html>
<head>
    <title>Vertex Bit Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #0F2B5B; margin-bottom: 20px; }
        .contact-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #0F2B5B;
        }
        .contact-card.unread { border-left-color: #DC2626; background: #FFF5F5; }
        .contact-name { font-size: 18px; font-weight: bold; color: #1A1A1A; }
        .contact-email { color: #0F2B5B; margin: 5px 0; }
        .contact-phone { color: #666; margin: 5px 0; }
        .contact-message { margin-top: 12px; padding: 12px; background: #F8F9FA; border-radius: 8px; }
        .contact-date { font-size: 12px; color: #999; margin-top: 8px; }
        .badge { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: bold;
            margin-left: 10px;
        }
        .badge-unread { background: #DC2626; color: white; }
        .badge-read { background: #10B981; color: white; }
        .refresh-btn {
            background: #0F2B5B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #0F2B5B; }
        .stat-label { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Vertex Bit Admin Dashboard</h1>
        
        <div class="stats" id="stats"></div>
        
        <button class="refresh-btn" onclick="loadContacts()">🔄 Refresh</button>
        
        <div id="contacts"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function loadContacts() {
            try {
                const response = await fetch(`${API_URL}/contacts`);
                const contacts = await response.json();
                
                // Update stats
                const unreadCount = contacts.filter(c => !c.is_read).length;
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${contacts.length}</div>
                        <div class="stat-label">Total Contacts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${unreadCount}</div>
                        <div class="stat-label">Unread</div>
                    </div>
                `;
                
                // Display contacts
                const contactsHtml = contacts.map(contact => `
                    <div class="contact-card ${!contact.is_read ? 'unread' : ''}">
                        <div>
                            <span class="contact-name">${escapeHtml(contact.name)}</span>
                            <span class="badge ${!contact.is_read ? 'badge-unread' : 'badge-read'}">
                                ${!contact.is_read ? 'NEW' : 'Read'}
                            </span>
                        </div>
                        <div class="contact-email">📧 ${escapeHtml(contact.email)}</div>
                        <div class="contact-phone">📞 ${escapeHtml(contact.phone)}</div>
                        <div><strong>Subject:</strong> ${escapeHtml(contact.subject || 'General Inquiry')}</div>
                        <div class="contact-message">💬 ${escapeHtml(contact.message)}</div>
                        <div class="contact-date">📅 ${new Date(contact.created_at).toLocaleString()}</div>
                        ${!contact.is_read ? `
                            <button onclick="markAsRead(${contact.id})" style="margin-top:10px; background:#0F2B5B; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">
                                Mark as Read
                            </button>
                        ` : ''}
                    </div>
                `).join('');
                
                document.getElementById('contacts').innerHTML = contactsHtml || '<p>No contacts yet.</p>';
            } catch (e) {
                document.getElementById('contacts').innerHTML = '<p>Error loading contacts. Make sure backend is running.</p>';
            }
        }
        
        async function markAsRead(id) {
            await fetch(`${API_URL}/contacts/${id}/read`, { method: 'PUT' });
            loadContacts();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadContacts();
        setInterval(loadContacts, 5000); // Auto-refresh every 5 seconds
    </script>
</body>
</html>
